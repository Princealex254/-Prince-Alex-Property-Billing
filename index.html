<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Alex | Property Management</title>
    <!-- External Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        serif: ['"Fraunces"', 'ui-serif', 'Georgia', 'serif'],
                    },
                    colors: {
                        canvas: '#F6F3EC',
                        ink: {
                            50:  '#F4F5F7',
                            100: '#E4E6EB',
                            200: '#C7CBD4',
                            300: '#9AA1AF',
                            400: '#6B7280',
                            500: '#464B57',
                            600: '#30333D',
                            700: '#22252D',
                            800: '#171920',
                            900: '#0C0D11',
                            950: '#07080A',
                        },
                        brass: {
                            50:  '#FBF6EC',
                            100: '#F3E6C6',
                            200: '#E6CD93',
                            300: '#D9B468',
                            400: '#C89C46',
                            500: '#AD7F2E',
                            600: '#8C6526',
                            700: '#6B4C1E',
                            800: '#4A3416',
                            900: '#2C1F0E',
                        },
                    },
                    boxShadow: {
                        'premium': '0 1px 2px rgba(12,13,17,0.04), 0 12px 32px -12px rgba(12,13,17,0.18)',
                        'premium-lg': '0 2px 4px rgba(12,13,17,0.06), 0 24px 48px -16px rgba(12,13,17,0.28)',
                    },
                },
            },
        };
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="font-sans antialiased min-h-screen text-ink-800 dark:text-ink-100" id="body">

        <svg id="sunIcon" class="w-6 h-6 text-brass-400 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>
        </svg>
        <svg id="moonIcon" class="w-6 h-6 text-ink-500 dark:text-ink-200" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
    </button>

    <div id="app">
        <!-- Content will be dynamically loaded here by JavaScript -->
    </div>

    <!-- Config file (must be loaded before app.js) -->
    <script src="config.js"></script>
    <!-- Email Service (must load before app.js) -->
    <script src="email.js"></script>
    <!-- External Application Script -->
    <script src="app.js"></script>
</body>
</html>
